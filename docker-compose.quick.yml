services:
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:13733:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:13732:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: outline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d outline"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  postgres_data:
  redis_data:
